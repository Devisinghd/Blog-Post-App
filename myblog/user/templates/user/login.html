{% block body %}
<form method="post" novalidate class="space-y-5">
{% csrf_token %}
{{ form.non_field_errors }}

<div>
    <label for="{{ form.username.id_for_label }}">Username</label>
    {{ form.username }}
    {{ form.username.errors }}
</div>

<div>
    <label for="{{ form.password.id_for_label }}">Password</label>
    {{ form.password }}
    {{ form.password.errors }}
</div>

<button type="submit" class="inline-flex w-full items-center justify-center rounded-3xl bg-teal-700 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-teal-700/20 transition hover:bg-teal-800">
    Log in
</button>
</form>
{% endblock %}
