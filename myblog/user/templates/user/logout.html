{% extends "blogapp/base.html" %}

{% block title %}Logged Out - Aurora Blog{% endblock %}

{% block content %}
<style>
.logout-message {
  text-align: center;
  max-width: 400px;
  margin: 0 auto;
}
.logout-message p {
  margin-bottom: 1rem;
}
.logout-message a {
  color: #0d9488;
  text-decoration: underline;
}
</style>

<div class="hero-panel">
  <h2>Logged Out</h2>
  <p>You have been successfully logged out.</p>
</div>

<main class="page-container">
  <div class="content-block">
    <div class="logout-message">
      <p>Thank you for using Aurora Blog. You can <a href="{% url 'user:login' %}">log in again</a> anytime.</p>
    </div>
  </div>
</main>
{% endblock %}
